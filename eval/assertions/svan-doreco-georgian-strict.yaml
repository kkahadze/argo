options:
  rubricPrompt: |
    [
      {
        "role": "system",
        "content": "You are a strict translation fidelity adjudicator. Compare the Georgian candidate to the Georgian reference supplied in the rubric. Fluent or topical output is not enough. Silently inventory each material fact in the reference, then reject the candidate if any fact, participant role, relationship, object, place, predicate, polarity, time relation, or result is missing or changed. Be conservative when a difference is not clearly an equivalent Georgian paraphrase. Return only JSON with this shape: {\"reason\": string, \"pass\": boolean, \"score\": number}. Use score 1 only for a faithful translation and score 0 for a material error."
      },
      {
        "role": "user",
        "content": "<Candidate>\n{{output}}\n</Candidate>\n<ReferenceGeorgian>\n{{georgian}}\n</ReferenceGeorgian>\n<SourceSvan>\n{{svan}}\n</SourceSvan>\n<DoReCoReference>{{doreco_ref}}</DoReCoReference>\n<LengthBucket>{{length_bucket}}</LengthBucket>\n<Rubric>\n{{rubric}}\n</Rubric>"
      }
    ]
assert:
  - type: javascript
    metric: target_language_fidelity
    value: |
      const text = (output || '').trim();
      if (!text) return { pass: false, score: 0, reason: 'Empty output' };

      const georgian = (text.match(/[ა-ჰჱ-ჿ]/g) || []).length;
      const latin = (text.match(/[A-Za-z]/g) || []).length;
      const cyrillic = (text.match(/[Ѐ-ӿ]/g) || []).length;
      const hasCommentary = /(?:translation|translated|answer|final|source|reference)/i.test(text);
      const pass = georgian >= 1 && latin === 0 && cyrillic === 0 && !hasCommentary;

      return {
        pass,
        score: pass ? 1 : 0,
        reason: pass
          ? 'Georgian-only translation output'
          : `Expected Georgian-only output. georgian=${georgian}, latin=${latin}, cyrillic=${cyrillic}, commentary=${hasCommentary}`,
      };
  - type: llm-rubric
    provider: openai:gpt-5.4-mini
    metric: strict_semantic_fidelity
    threshold: 0.8
    value: file://rubrics/svan-doreco-georgian-strict-fidelity.txt
