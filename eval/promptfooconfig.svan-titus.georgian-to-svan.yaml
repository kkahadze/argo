# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "TITUS Svan prose blocks: Georgian to Svan"

providers:
  - id: file://provider.py
    label: "GPT-5.5 reasoning none"
    config:
      provider: openai
      model: gpt-5.5
      reasoning_effort: none
      source_language: georgian
      target_language: svan
      temperature: 0.2
      max_tokens: 768
  - id: file://provider.py
    label: "Gemini 3.1 Flash Lite"
    config:
      provider: gemini
      model: gemini-3.1-flash-lite-preview
      source_language: georgian
      target_language: svan
      temperature: 0.2
      max_tokens: 768

prompts:
  - "{{georgian}}"

tests: file://datasets/svan-titus-balanced-blocks.csv

maxConcurrency: 12

defaultTest:
  assert:
    - type: llm-rubric
      provider: openai:gpt-5-mini
      metric: target_language_fidelity
      threshold: 0.8
      value: |
        Check whether the output is actually a Svan translation.

        Accept Svan written in Mkhedruli-style script with the diacritics and orthographic variation visible in the reference.
        Be tolerant of minor spelling variation and punctuation differences.

        Fail if the response is mainly:
        - Georgian instead of Svan
        - English instead of Svan
        - an explanation, gloss list, or commentary rather than a translation

        Source Georgian: {{georgian}}
        Reference Svan: {{svan}}
        Length bucket: {{length_bucket}}
        Output must be only the translation.
    - type: llm-rubric
      provider: openai:gpt-5-mini
      metric: semantic_accuracy
      threshold: 0.8
      value: |
        You are grading a Georgian-to-Svan translation from an aligned TITUS prose block.

        Grade semantic correctness, not literal string match.

        Pass if the output preserves the meaning of the Georgian source and is a natural Svan rendering.
        Be tolerant of accepted Svan orthographic variation, word-order differences, and light punctuation differences.

        Require:
        - preservation of named entities, numbers, and place names
        - preservation of the core events, participant roles, and explicit relationships
        - no invented facts or meaning reversals
        - no omission of important clauses in longer blocks

        For longer blocks, evaluate clause by clause. Do not pass partial translations.
        Fail if the output is commentary, mostly Georgian, or only loosely related to the reference.

        Source Georgian: {{georgian}}
        Reference Svan: {{svan}}
        Length bucket: {{length_bucket}}
        Confidence: {{confidence}}
        Notes: {{notes}}
