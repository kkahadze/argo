# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "GPT-5.5 reasoning none vs low vs Gemini current setup: English to Mingrelian"

providers:
  - id: file://provider.py
    label: "GPT-5.5 reasoning none"
    config:
      provider: openai
      model: gpt-5.5
      reasoning_effort: none
      source_language: english
      target_language: mingrelian
      temperature: 0.2
      max_tokens: 256
  - id: file://provider.py
    label: "GPT-5.5 reasoning low"
    config:
      provider: openai
      model: gpt-5.5
      reasoning_effort: low
      source_language: english
      target_language: mingrelian
      temperature: null
      max_tokens: 1024
  - id: file://provider.py
    label: "Gemini 3.1 Flash Lite current"
    config:
      provider: gemini
      model: gemini-3.1-flash-lite-preview
      source_language: english
      target_language: mingrelian
      temperature: 0.2
      max_tokens: 256

prompts:
  - "{{english}}"

tests: file://datasets/notion-mingrelian-lesson-notes-triples.csv

maxConcurrency: 2

defaultTest:
  assert:
    - type: llm-rubric
      provider: openai:gpt-5-mini
      metric: target_language_fidelity
      threshold: 0.8
      value: |
        Check whether the output is actually a Mingrelian translation.

        Accept either:
        - Mingrelian written in Mkhedruli
        - a clear Latin-script transliteration of Mingrelian

        Be tolerant of:
        - borrowed names
        - normal loanwords
        - orthographic variation

        Fail if the response is mainly:
        - Georgian instead of Mingrelian
        - English instead of Mingrelian
        - an explanation, gloss list, or commentary rather than a translation

        Source English: {{english}}
        Reference Mingrelian: {{mingrelian}}
        Additional acceptable Mingrelian variants from the runtime lexicon: {{acceptable_mingrelian_variants}}
        Reference Georgian: {{georgian}}
        If the output matches the reference or any listed acceptable variant, do not fail it just because it differs from the primary reference string.
        Output must be only the translation.
    - type: llm-rubric
      provider: openai:gpt-5-mini
      metric: semantic_accuracy
      threshold: 0.8
      value: |
        You are grading an English-to-Mingrelian translation.

        Grade semantic correctness, not literal string match.

        Pass if the output preserves the meaning of the English source and is a natural Mingrelian rendering.

        Be tolerant of:
        - acceptable Mingrelian spelling, transliteration, and orthographic variation
        - reasonable synonym choice when the same meaning is preserved
        - word order differences
        - light punctuation differences
        - names rendered in an equivalent form when the identity is preserved
        - medium-confidence rows that allow broader but still faithful phrasing

        Require:
        - preservation of named entities, numbers, and explicit names
        - preservation of the core predicate/action and participant roles
        - no invented facts or meaning reversals
        - no omission of important content in longer sentences

        For long sentences, evaluate clause by clause. Do not pass partial translations.

        Source English: {{english}}
        Reference Mingrelian: {{mingrelian}}
        Additional acceptable Mingrelian variants from the runtime lexicon: {{acceptable_mingrelian_variants}}
        Parallel Georgian: {{georgian}}
        Confidence: {{confidence}}
        Notes: {{notes}}
        If the output matches the reference or any listed acceptable variant while preserving the meaning, pass it.
