# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Clean DoReCo held-out Mkhedruli Svan segments: Svan to Georgian GPT-5.5 medium"

providers:
  - id: file://provider.py
    label: "GPT-5.5 reasoning medium"
    config:
      provider: openai
      model: gpt-5.5
      reasoning_effort: medium
      source_language: svan
      target_language: georgian
      max_tokens: 8192
      timeout: 300000

prompts:
  - "{{svan}}"

tests: file://datasets/svan-doreco-heldout-georgian.csv

maxConcurrency: 2

defaultTest:
  assert:
    - type: javascript
      metric: target_language_fidelity
      value: |
        const text = (output || '').trim();
        if (!text) return { pass: false, score: 0, reason: 'Empty output' };

        const georgian = (text.match(/[ა-ჰჱ-ჿ]/g) || []).length;
        const latin = (text.match(/[A-Za-z]/g) || []).length;
        const cyrillic = (text.match(/[Ѐ-ӿ]/g) || []).length;
        const hasCommentary = /(?:translation|translated|answer|final|source|reference)/i.test(text);
        const pass = georgian >= 1 && latin === 0 && cyrillic === 0 && !hasCommentary;

        return {
          pass,
          score: pass ? 1 : 0,
          reason: pass
            ? 'Georgian-only translation output'
            : `Expected Georgian-only output. georgian=${georgian}, latin=${latin}, cyrillic=${cyrillic}, commentary=${hasCommentary}`,
        };
    - type: llm-rubric
      provider: openai:gpt-5.5
      metric: semantic_accuracy
      threshold: 0.8
      value: |
        You are grading a held-out DoReCo Svan-to-Georgian translation.

        The source is a clean DoReCo Mkhedruli Svan sentence segment and the reference is its aligned Georgian translation.
        Grade semantic correctness, not literal string match. Treat the Georgian reference as ground truth.
        Pass only if the output preserves the reference's main predicate and its material content.
        Be tolerant of orthographic variation, natural word order, inflectional variation, and minor punctuation differences.

        Require:
        - preservation of core event, statement, or question
        - preservation of concrete participants, roles, places, objects, quantities, and descriptors that affect meaning
        - preservation of polarity, conditionals, time relations, and explicit relationships
        - no substituted object, role, action, place, simile, or property merely because it is topically related
        - no invented events, meaning reversals, untranslated Svan carry-through, or unrelated content

        Fail if the output is commentary, mostly non-Georgian, only loosely related to the reference, misses the main clause, or replaces a reference content word with a different-content word.
        If the output and reference differ on a concrete content word and you cannot justify that difference as the same meaning in Georgian, fail it.

        Source Svan: {{svan}}
        Reference Georgian: {{georgian}}
        DoReCo reference: {{doreco_ref}}
        Length bucket: {{length_bucket}}
