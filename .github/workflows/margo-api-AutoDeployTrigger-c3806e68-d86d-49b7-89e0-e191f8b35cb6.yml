name: Trigger auto deployment for margo-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/margo-api-AutoDeployTrigger-c3806e68-d86d-49b7-89e0-e191f8b35cb6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MARGOAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MARGOAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MARGOAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}argo
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: margotranslatoracr.azurecr.io
          registryUsername: ${{ secrets.MARGOAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MARGOAPI_REGISTRY_PASSWORD }}
          containerAppName: margo-api
          resourceGroup: margo-rg
          imageToBuild: margotranslatoracr.azurecr.io/margo-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


